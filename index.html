function useCounter(target, duration = 2000, start = false) {
  const [count, setCount] = useState(0);
  useEffect(() => {
    if (!start) return;
    let startTime = null;
    const step = (ts) => {
      if (!startTime) startTime = ts;
      const p = Math.min((ts - startTime) / duration, 1);
      setCount(Math.floor(p * target));
      if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [target, duration, start]);
  return count;
}

function Reveal({ children, delay = 0 }) {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setV(true); obs.disconnect(); } }, { threshold: 0.1 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return <div ref={ref} style={{ opacity: v ? 1 : 0, transform: v ? "translateY(0)" : "translateY(20px)", transition: `all 0.6s ease ${delay}s` }}>{children}</div>;
}

  const [hovered, setHovered] = useState(false);
  const ac = accentColor || ACCENT;

  return (
    <div
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        padding: "24px 28px",
        background: hovered ? "#FFFFFF" : "#FEFCF9",
        border: `1px solid ${hovered ? ac + "44" : "#e8e2d8"}`,
        borderRadius: 8,
        transition: "all 0.25s ease",
        boxShadow: hovered ? "0 2px 12px rgba(0,0,0,0.04)" : "none",

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: expanded ? 10 : 0 }}>

              {item.activity}
            </div>
          )}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12, flexShrink: 0, marginTop: 4 }}>

            ))}
          </g>
        ))}

        <text x={380} y={172} textAnchor="middle" fontSize={8} fontFamily="system-ui, sans-serif" fill="#b5ad9e" letterSpacing={1}>INTER-AGENT BUS</text>
      </svg>
    </div>
  );
